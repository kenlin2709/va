<section class="ap">
  <div class="ap__head">
    <div class="container">
      <h1 class="ap__title">All Products</h1>

      <div class="ap__note" *ngIf="error()">{{ error() }}</div>
    </div>
  </div>

  <!-- Category filter -->
  <div class="ap__cats">
    <div class="ap__catsInner container">
      <button
        *ngFor="let cat of categories()"
        class="ap__cat"
        [class.ap__cat--active]="selectedCategoryId() === cat._id"
        type="button"
        (click)="selectCategory(cat._id)"
      >
        {{ cat.name }}
      </button>
    </div>
  </div>

  <div class="container ap__gridWrap">
    <div class="ap__count">{{ filtered().length }} products</div>

    <div class="ap__grid" *ngIf="!loading()">
      <app-product-card
        *ngFor="let p of filtered()"
        [title]="p.title"
        [price]="formatPrice(p.price)"
        [imageUrl]="p.imageUrl || null"
        [imageAlt]="p.title"
        [link]="'/products/' + p.id"
        addMode="icon"
        (add)="addToCart(p)"
      />
    </div>

    <div class="ap__loading" *ngIf="loading()">Loading…</div>
  </div>
</section>
